name: encrocante_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  dio: ^5.0.0
  flutter_secure_storage: ^9.0.0
  
  # --- FORZAMOS LA ACTUALIZACIÓN A LA ÚLTIMA VERSIÓN ---
  getwidget: ^7.0.0 # Usamos la versión más reciente y compatible
  rive: ^0.13.4

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.13.1" 

flutter_launcher_icons:
  android: "launcher_icon" 
  ios: true
  image_path: "assets/icon/logo_crocante.png" # <--- ¡Ruta corregida a tu ícono personalizado!
  min_sdk_android: 21 

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/icon/ 
