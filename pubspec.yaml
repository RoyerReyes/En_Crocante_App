name: encrocante_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.8+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  dio: ^5.0.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.0.0
  socket_io_client: ^2.0.0
  
  # --- FORZAMOS LA ACTUALIZACIÓN A LA ÚLTIMA VERSIÓN ---
  fl_chart: ^0.65.0 # Charts for Reports
  pdf: ^3.10.0
  printing: ^5.11.0
  rive: ^0.13.4

  cupertino_icons: ^1.0.2
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  package_info_plus: ^8.1.0 
  url_launcher: ^6.3.1
  
  # Offline Capability
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^5.0.2
  uuid: ^4.2.2
  flutter_ringtone_player: ^4.0.0
  flutter_local_notifications: ^17.0.0
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1 # Added for DishAvatar

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.13.1" 
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: "launcher_icon" 
  ios: true
  image_path: "assets/icon/logo_crocante.png" # <--- ¡Ruta corregida a tu ícono personalizado!
  min_sdk_android: 21 

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/icon/
